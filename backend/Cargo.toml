[package]
name = "amirsalarsafaeicom-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
salar-interface = {path = "../autogenerated/rust"}
tonic = "0.12.3"
tonic-web = "0.12.3"
tonic-reflection = "0.12.3"
prost = "0.13"
prost-types = "0.13"
tokio = { version = "1", features = ["full"] }
clap = { version = "4.5.21", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
rspotify = "0.13.3"
log = "0.4"
toml_edit = "0.22.22"
env_logger = "0.10"
chrono = "0.4.39"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "time", "migrate"] }
serde_json = "1.0"
time = { version = "0.3", features = ["serde"] }
uuid = { version = "1.0", features = ["serde", "v4"] }
axum = { version = "0.7.9", features = ["multipart"] }
base64 = "0.22.1"
futures = "0.3.31"
tower-http = { version = "0.5", features = ["cors"]}
http = "1"
tower-layer = "0.3"
bytes = "1.0"


[build-dependencies]
tonic-build = "0.12.3"
