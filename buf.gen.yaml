version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/amirsalarsafaei/amirsalarsafaei.com/autogenerated/go
    except:
      - buf.build/googleapis/googleapis
      - buf.build/protocolbuffers/wellknowntypes
      - buf.build/grpc-ecosystem/grpc-gateway
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: autogenerated/go
    opt:
      - paths=source_relative
  - plugin: buf.build/grpc/go
    out: autogenerated/go
    opt:
      - paths=source_relative
  - plugin: buf.build/community/stephenh-ts-proto
    out: autogenerated/ts
    opt:
      - env=both
      - outputClientImpl=grpc-web
      - useOptionals=messages
      - useExactTypes=true
      - exportCommonSymbols=true
      - onlyTypes=false
      - esModuleInterop=true
      - stringEnums=true
      - addGrpcMetadata=true
      - forceLong=string
      - outputJsonMethods=true
      - outputEncodeMethods=true
      - includeCommonJs=true
      - generateWellKnownTypes=true
  # Pinned to the tonic 0.12 / prost 0.13 generation the backend builds against.
  - plugin: buf.build/community/neoeinstein-prost:v0.4.0
    out: autogenerated/rust/src
    opt:
      - bytes=bytes
      - file_descriptor_set=true
  - plugin: buf.build/community/neoeinstein-tonic:v0.4.1
    out: autogenerated/rust/src
  - plugin: prost-crate
    strategy: all
    out: autogenerated/rust
    opt:
      - gen_crate=proto/Cargo.toml
