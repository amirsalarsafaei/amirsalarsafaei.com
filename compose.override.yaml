services:
  frontend-dev:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GRPC_WEB_URL: ${NEXT_PUBLIC_GRPC_WEB_URL:-http://localhost:8000}
      NEXT_PUBLIC_IMAGE_SERVER_WEB_URL: ${NEXT_PUBLIC_IMAGE_SERVER_WEB_URL:-http://localhost:3001}
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - ./autogenerated/ts:/app/autogenerated/ts
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - dev
