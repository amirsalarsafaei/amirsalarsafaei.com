services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amirsalarsafaeicom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amirsalarsafaeicom}
      POSTGRES_DB: ${POSTGRES_DB:-amirsalarsafaeicom}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-amirsalarsafaeicom}:${POSTGRES_PASSWORD:-amirsalarsafaeicom}@postgres:5432/${POSTGRES_DB:-amirsalarsafaeicom}
      AUTH_TOKEN: ${AUTH_TOKEN:-dev-token}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN:-}
      IMAGE_SERVER_HOST: "0.0.0.0"
    depends_on:
      - postgres
    volumes:
      - uploads:/uploads

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
