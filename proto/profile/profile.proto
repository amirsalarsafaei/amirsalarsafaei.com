syntax = "proto3";

package profile;

// Profile exposes the "about me" content that is shared by every client
// (website + SSH terminal) so it has a single source of truth in the backend.
service Profile {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
}

message GetProfileRequest {}

message Link {
  string label = 1;
  string url = 2;
}

message GetProfileResponse {
  string name = 1;
  string title = 2;
  // Bio rendered as Markdown.
  string bio = 3;
  repeated Link links = 4;
  // The skills shown as an `ls -la skills/` listing on the website.
  repeated Skill skills = 5;
  // "Current focus" rendered as Markdown.
  string current_focus = 6;
  // Structured CV, one ResumeSection per CV heading.
  Resume resume = 7;
  // Absolute URL of the profile photo, shown in the "about me" of every client
  // (rendered as half-blocks in the SSH terminal, an <img> on the website).
  string image_url = 8;
}

// A single skill/interest with a proficiency level.
message Skill {
  string name = 1; // e.g. "golang"
  Level level = 2;

  enum Level {
    LEVEL_UNSPECIFIED = 0;
    EXPERT = 1;
    PROFICIENT = 2;
    LEARNING = 3;
    PASSION = 4;
  }
}

// Structured CV shared by every client.
message Resume {
  string full_name = 1;
  string email = 2;
  string github_url = 3;
  repeated ResumeSection sections = 4;
}

message ResumeSection {
  string heading = 1; // e.g. "Education"
  string body = 2; // preformatted text block
}
