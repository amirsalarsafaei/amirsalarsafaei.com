# Unified formatter config. Run with: `treefmt`
# Devbox provides treefmt, rustfmt, prettier, and go (gofmt).

[formatter.rustfmt]
command  = "rustfmt"
options  = ["--edition", "2021"]
includes = ["*.rs"]

[formatter.gofmt]
command  = "gofmt"
options  = ["-w"]
includes = ["*.go"]
excludes = ["autogenerated/**"]

[formatter.prettier]
command  = "prettier"
options  = ["--write"]
includes = [
  "*.json",
  "*.md",
  "*.yaml",
  "*.yml",
  "frontend/**/*.ts",
  "frontend/**/*.tsx",
  "frontend/**/*.js",
  "frontend/**/*.jsx",
]
excludes = [
  "node_modules/**",
  "**/.next/**",
  "autogenerated/**",
  "frontend/yarn.lock",
  "autogenerated/yarn.lock",
]
